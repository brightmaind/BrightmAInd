<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Message Sent Successfully - Bright mAInd</title>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #141414;
            color: #EDEDED;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            max-width: 600px;
            text-align: center;
            padding: 2rem;
        }
        .success-icon {
            width: 80px;
            height: 80px;
            background: #FF7A00;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 2rem;
            font-size: 2rem;
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            color: #EDEDED;
        }
        p {
            font-size: 1.2rem;
            line-height: 1.6;
            margin-bottom: 2rem;
            color: rgba(237, 237, 237, 0.8);
        }
        .btn {
            display: inline-block;
            background: #FF7A00;
            color: white;
            padding: 12px 24px;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        .btn:hover {
            background: rgba(255, 122, 0, 0.9);
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="success-icon">✓</div>
        <h1>Message Sent Successfully!</h1>
        <p>Thank you for reaching out to us. We've received your message and will get back to you within 4 hours during business days.</p>
        <p>We're excited to discuss how we can help grow your business with our web design and marketing services.</p>
        <a href="/" class="btn">Return to Homepage</a>
    </div>
</body>
</html>
